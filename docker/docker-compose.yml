      SPRING_DATASOURCE_USERNAME: ${CB_DB_USER:-}
      SPRING_DATASOURCE_PASSWORD: ${CB_DB_PASS:-}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      BLOB_STORAGE_NAME: ${BLOB_STORAGE_NAME:-local-placeholder}
      BLOB_STORAGE_KEY: ${BLOB_STORAGE_KEY:-local-placeholder}
      BLOB_STORAGE_CONTAINER: ${BLOB_STORAGE_CONTAINER:-local-placeholder}
      BLOB_STORAGE_ENDPOINT: ${BLOB_STORAGE_ENDPOINT:-http://localhost}
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # corporate-frontend  (Angular 8 + nginx)
  # ─────────────────────────────────────────
  corporate-frontend:
    build:
      context: ${WORKSPACE}
