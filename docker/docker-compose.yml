# Xcelerate Personal Local Stack — docker-compose.yml
#
# All ports and source dirs come from the slot env file.
# Run via: ~/xcelerate-local/stack up <slot-name>
#
# Internal ports (inside Docker network) never change.
# Only host-side ports are parameterized — so nginx proxies always work.

services:
  # ─────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # contractor-backend  (Spring Boot 3 / Java 21)
  # ─────────────────────────────────────────
  contractor-backend:
    build:
      context: ${WORKSPACE}
      dockerfile: ${STACK_ROOT}/docker/Dockerfile.contractor-backend
      target: runtime
      args:
        SRC_DIR: ${CB_SRC_DIR:-xcelerate-contractor-backend}
    image: xcelerate/contractor-backend:${STACK_NAME:-local}
    profiles: ["contractor"]
    ports:
      - "${CB_PORT:-8081}:8081"
    environment:
      APP_ENV: ${APP_ENV:-local}
      SPRING_PROFILES_ACTIVE: ${CB_SPRING_PROFILE:-dev}
      SPRING_DATASOURCE_URL: ${CB_DB_URL:-}
      SPRING_DATASOURCE_USERNAME: ${CB_DB_USER:-}
      SPRING_DATASOURCE_PASSWORD: ${CB_DB_PASS:-}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # qbo-integration  (Spring Boot 1.5 / Java 8)
  # ─────────────────────────────────────────
  qbo-integration:
    build:
      context: ${WORKSPACE}
      dockerfile: ${STACK_ROOT}/docker/Dockerfile.qbo-integration
      target: runtime
      args:
        SRC_DIR: ${QBO_SRC_DIR:-xcelerate-qbo-integration}
    image: xcelerate/qbo-integration:${STACK_NAME:-local}
    profiles: ["qbo"]
    ports:
      - "${QBO_PORT:-8083}:8081"
    environment:
      APP_ENV: ${APP_ENV:-local}
      SPRING_PROFILES_ACTIVE: ${QBO_SPRING_PROFILE:-dev}
      SPRING_DATASOURCE_URL: ${QBO_DB_URL:-}
      SPRING_DATASOURCE_USERNAME: ${QBO_DB_USER:-}
      SPRING_DATASOURCE_PASSWORD: ${QBO_DB_PASS:-}
      SPRING_RABBITMQ_ADDRESSES: "rabbitmq:5672"
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
  # xipp-backend  (Spring Boot / Java 21)
  # ─────────────────────────────────────────
  xipp-backend:
    build:
      context: ${WORKSPACE}
      dockerfile: ${STACK_ROOT}/docker/Dockerfile.xipp-backend
      args:
        SRC_DIR: ${XIPP_BACKEND_SRC_DIR:-xcelerate-invoice-payment-processor}
    image: xcelerate/xipp-backend:${STACK_NAME:-local}
    profiles: ["xipp"]
    ports:
      - "${XIPP_BACKEND_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-local}
      SPRING_PROFILES_ACTIVE: ${XIPP_SPRING_PROFILE:-local}
      DATABASE_URL: ${XIPP_DB_URL:-}
      DATABASE_USERNAME: ${XIPP_DB_USER:-}
      DATABASE_PASSWORD: ${XIPP_DB_PASS:-}
      JWT_SECRET: ${XIPP_JWT_SECRET:-}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped

  # ─────────────────────────────────────────
  # xipp-frontend  (React/Vite + Node)
  # ─────────────────────────────────────────
  xipp-frontend:
    build:
      context: ${WORKSPACE}
      dockerfile: ${STACK_ROOT}/docker/Dockerfile.xipp-frontend
      args:
        SRC_DIR: ${XIPP_FRONTEND_SRC_DIR:-xcelerate-ipp-frontend-v1}
    image: xcelerate/xipp-frontend:${STACK_NAME:-local}
    profiles: ["xipp"]
    ports:
      - "${XIPP_FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_BASE_URL: http://localhost:${XIPP_BACKEND_PORT:-8080}/api
    depends_on:
      xipp-backend:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────
